<style>
    .overview {
        background-color: #FFF;
    }
    .slideshow{
    max-width:1100px;
    width:100%;
    margin:20px auto;
    font-family:sans-serif;
    }

    .slides{
    position:relative;
    aspect-ratio:16/9;
    overflow:hidden;
    border-radius:6px;
    box-shadow:0 6px 20px rgba(0,0,0,0.15);
    }

    .slide{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    opacity:0;
    transition:opacity 0.9s ease;
    }

    .slide.active{
    opacity:1;
    z-index:1;
    }

    .slide img{
    width:100%;
    height:100%;
    object-fit:cover;
    }

    .caption{
    text-align:center;
    margin-top:14px;
    font-size:18px;
    color:#444;
    letter-spacing:0.03em;
    }

    .dots{
    text-align:center;
    margin-top:14px;
    }

    .dot{
    height:8px;
    width:8px;
    margin:5px;
    display:inline-block;
    border-radius:6px;
    background:#cfcfcf;
    transition:all .25s ease;
    cursor:pointer;
    }

    .dot.active{
    background:#222;
    width:24px;
    }
</style>

<div class="bar no-mb no-padding overview">

</div>

<script>
document.querySelectorAll(".slideshow").forEach(slideshow=>{

let slides=slideshow.querySelectorAll(".slide");
let dotsContainer=slideshow.querySelector(".dots");
let caption=slideshow.querySelector(".caption");

let index=0;

slides.forEach((_,i)=>{
let d=document.createElement("span");
d.className="dot";
d.onclick=()=>{index=i;show();}
dotsContainer.appendChild(d);
});

let dots=dotsContainer.querySelectorAll(".dot");

function show(){

slides.forEach(s=>s.classList.remove("active"));
dots.forEach(d=>d.classList.remove("active"));

slides[index].classList.add("active");
dots[index].classList.add("active");

caption.textContent = slides[index].dataset.caption;

}

function next(){
index=(index+1)%slides.length;
show();
}

setInterval(next,5000);

show();

});
</script>
