<script>
document.querySelectorAll(".slideshow").forEach(slideshow => {
  
  if (slideshow.dataset.initialized) return;
  slideshow.dataset.initialized = "true";

  const slides = slideshow.querySelectorAll(".slide");
  const dotsContainer = slideshow.querySelector(".dots");
  const caption = slideshow.querySelector(".caption");

  if (dotsContainer) dotsContainer.innerHTML = "";

  let struct_index = 0;

  slides.forEach((_, i) => {
    let d = document.createElement("span");
    d.className = "dot";
    d.onclick = () => {
      struct_index = i;
      show();
    };
    if (dotsContainer) dotsContainer.appendChild(d);
  });

  const dots = dotsContainer ? dotsContainer.querySelectorAll(".dot") : [];

  function show() {
    slides.forEach(s => s.classList.remove("active"));
    dots.forEach(d => d.classList.remove("active"));

    if (slides[struct_index]) {
      slides[struct_index].classList.add("active");
      if (dots[struct_index]) dots[struct_index].classList.add("active");
      if (caption) {
        caption.textContent = slides[struct_index].dataset.caption || "";
      }
    }
  }

  function next() {
    struct_index = (struct_index + 1) % slides.length;
    show();
  }

  setInterval(next, 5000);
  show();
});
</script>
