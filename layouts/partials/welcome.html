<script>
document.addEventListener("DOMContentLoaded", function(){
  const yt = document.querySelectorAll(".youtube");

  yt.forEach(el => {
    const id = el.dataset.id;

    el.addEventListener("click", function(){
      el.innerHTML = `<iframe src="https://www.youtube.com/embed/${id}?autoplay=1" frameborder="0" allowfullscreen style="width:100%;height:100%"></iframe>`;
    });
  });
});
</script>
