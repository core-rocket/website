<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>{{ .Title }} | {{ .Site.Title }}</title>

<meta name="description" content="{{ .Description | default .Site.Params.defaultDescription }}">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<!-- Font -->
<link href='//fonts.googleapis.com/css?family=Roboto:400,300,500,700&display=swap' rel='stylesheet'>

<!-- Bootstrap -->
<link rel="stylesheet" href="//maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css">

<!-- Font Awesome -->
<link rel="stylesheet" href="//use.fontawesome.com/releases/v5.11.2/css/all.css">

{{- $styles := slice (resources.Get "css/style.red.css") (resources.Get "css/custom.css") -}}
{{- $finalStyle := $styles | resources.Concat "css/bundle.css" | resources.Minify | resources.Fingerprint -}}

<!-- 非同期読み込み設定 -->
<link rel="preload" href="{{ $finalStyle.Permalink }}" as="style" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link rel="stylesheet" href="{{ $finalStyle.Permalink }}"></noscript>

<!-- Favicon -->
<link rel="icon" href="{{ "img/favicon.ico" | relURL }}">

</head>
