<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ .Title }} | {{ .Site.Title }}</title>
  <meta name="description" content="{{ .Description | default .Site.Params.defaultDescription }}">

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href='//fonts.googleapis.com/css?family=Roboto:400,300,500,700&display=swap' rel='stylesheet'>

  <!-- 以前のように、static フォルダのパスをそのまま書く方式に戻す -->
  <link rel="stylesheet" href="{{ "css/bootstrap.min.css" | relURL }}">
  <link rel="stylesheet" href="{{ "css/all.css" | relURL }}">
  <link rel="stylesheet" href="{{ "css/style.default.css" | relURL }}">
  <link rel="stylesheet" href="{{ "css/custom.css" | relURL }}">

  <link rel="icon" href="{{ "img/favicon.ico" | relURL }}">
</head>
