<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>{{ .Title }} | {{ .Site.Title }}</title>

<meta name="description" content="{{ .Description | default .Site.Params.defaultDescription }}">

<!-- Font -->
<link href='//fonts.googleapis.com/css?family=Roboto:400,300,500,700' rel='stylesheet'>

<!-- Bootstrap -->
<link rel="stylesheet" href="//maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css">

<!-- Font Awesome -->
<link rel="stylesheet" href="//use.fontawesome.com/releases/v5.11.2/css/all.css">

<!-- Theme CSS -->
<link href="{{ "css/style.default.css" | relURL }}" rel="stylesheet">

<!-- Custom CSS -->
<link href="{{ "css/custom.css" | relURL }}" rel="stylesheet">

<!-- Favicon -->
<link rel="icon" href="{{ "img/favicon.ico" | relURL }}">

</head>
