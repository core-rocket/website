{{ if default true .Site.Params.CarouselHomepage.enable }}
{{ if isset .Site.Data "carousel" }}
{{ if gt (len .Site.Data.carousel) 0 }}

<section id="intro">
<div class="home-carousel no-mb no-padding">
<div class="homepage owl-carousel"
data-autoplay="{{ default true .Site.Params.CarouselHomepage.auto_play }}"
data-slide-speed="{{ default 2000 .Site.Params.CarouselHomepage.slide_speed }}"
data-pagination-speed="{{ default 1000 .Site.Params.CarouselHomepage.pagination_speed }}">

{{ range sort .Site.Data.carousel "weight" }}
<div class="item">
<img src="{{ .image | absURL }}" class="carousel-img">
</div>
{{ end }}

</div>
</div>
</section>

<div class="mobile-hero">
<img src="/img/hp2.jpg">
</div>

<style>

#intro{
position:relative;
width:100%;
padding:0 !important;
overflow:hidden;
}

.carousel-img{
width:100%;
height:100%;
object-fit:cover;
display:block;
}

.mobile-hero{
display:none;
width:100%;
}

.mobile-hero img{
width:100%;
height:auto;
display:block;
}

@media (min-width:768px){

#intro{
height:100svh;
}

.home-carousel,
.home-carousel .owl-carousel,
.home-carousel .owl-stage-outer,
.home-carousel .owl-stage,
.home-carousel .owl-item,
.home-carousel .item{
height:100svh !important;
}

}

.mobile-hero{
display:none;
width:100%;
height:45vh;
overflow:hidden;
}

.mobile-hero img{
width:100%;
height:100%;
object-fit:cover;
object-position:center;
display:block;
}

.mobile-hero{
display:none;
width:100%;
height:45vh;
overflow:hidden;
}

.mobile-hero img{
width:100%;
height:100%;
object-fit:cover;
object-position:center;
display:block;
}

@media (max-width:767px){

#intro{
display:none;
}

.mobile-hero{
display:block;
}

}

.home-carousel .dark-mask{
display:none !important;
}

.owl-theme .owl-controls{
position:absolute;
bottom:20px;
width:100%;
z-index:10;
}

.owl-theme .owl-controls .owl-page span{
background:#ffffff !important;
}

#content,
.homepage{
padding-top:0 !important;
margin-top:0 !important;
}

</style>

{{ end }}
{{ end }}
{{ end }}
