{{ if default true .Site.Params.CarouselHomepage.enable }}
{{ if isset .Site.Data "carousel" }}
{{ if gt (len .Site.Data.carousel) 0 }}

<section id="intro">
<div class="home-carousel no-mb no-padding">
<div class="homepage owl-carousel"
data-autoplay="{{ default true .Site.Params.CarouselHomepage.auto_play }}"
data-slide-speed="{{ default 2000 .Site.Params.CarouselHomepage.slide_speed }}"
data-pagination-speed="{{ default 1000 .Site.Params.CarouselHomepage.pagination_speed }}">

{{ range sort .Site.Data.carousel "weight" }}
<div class="item">
 {{ if .video }}
        <video autoplay muted loop playsinline style="width: 100%; height: auto;">
            <source src="{{ .video | absURL }}" type="video/mp4">
            お使いのブラウザは動画タグをサポートしていません。
        </video>
    {{ else }}
        <img class="img-responsive" src="{{ .image | absURL }}" alt="">
    {{ end }}
</div>
{{ end }}

</div>
</div>
</section>

<div class="mobile-hero">
<img src="/img/ss/hp2.webp">
</div>

<style>

html, body{
overflow-x:hidden;
}

#intro{
position:relative;
width:100vw;
margin:0;
padding:0 !important;
overflow:hidden;
}

.carousel-img{
width:100%;
height:100%;
object-fit:cover;
display:block;
max-width:100%;
}

.home-carousel,
.home-carousel .owl-carousel,
.home-carousel .owl-stage-outer{
width:100%;
max-width:100%;
overflow:hidden;
}

.owl-item{
overflow:hidden;
}

.owl-stage{
max-width:100% !important;
transform:translate3d(0,0,0);
}

#intro .container,
#intro .row{
padding-left:0 !important;
padding-right:0 !important;
margin:0 !important;
max-width:100% !important;
}

@media (min-width:768px) and (max-width:991px) {

#intro{
height:70vh;
}

.home-carousel,
.home-carousel .owl-carousel,
.home-carousel .owl-stage-outer,
.home-carousel .owl-stage,
.home-carousel .owl-item,
.home-carousel .item{
height:70vh !important;
}

}

.mobile-hero{
display:none;
width:100%;
}

.mobile-hero img{
width:100%;
height:auto;
display:block;
}

@media (min-width: 992px){
    #intro{
    height:100vh;
    }
    .home-carousel,
    .home-carousel .owl-carousel,
    .home-carousel .owl-stage-outer,
    .home-carousel .owl-stage,
    .home-carousel .owl-item,
    .home-carousel .item{
    height:100vh !important;
    }
}

@media (max-width:767px){

#intro{
display:none;
}

.mobile-hero{
display:block;
}

.homepage,
.owl-carousel,
.owl-stage-outer{
width:100% !important;
overflow:hidden !important;
}

.owl-stage{
transform:none !important;
}

}

.home-carousel .dark-mask{
display:none !important;
}

.owl-theme .owl-controls{
position:absolute;
bottom:20px;
width:100%;
z-index:10;
}

.owl-theme .owl-controls .owl-page span{
background:#ffffff !important;
}

#content,
.homepage{
padding-top:0 !important;
margin-top:0 !important;
}

</style>

{{ end }}
{{ end }}
{{ end }}
