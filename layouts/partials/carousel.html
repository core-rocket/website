{{ if default true .Site.Params.CarouselHomepage.enable }}
{{ if isset .Site.Data "carousel" }}
{{ if gt (len .Site.Data.carousel) 0 }}
<section id="intro">
    <div class="home-carousel no-mb no-padding" style="background: none !important;">
        <div class="homepage owl-carousel"
             data-autoplay="{{ default true .Site.Params.CarouselHomepage.auto_play }}"
             data-slide-speed="{{ default 2000 .Site.Params.CarouselHomepage.slide_speed }}"
             data-pagination-speed="{{ default 1000 .Site.Params.CarouselHomepage.pagination_speed }}">
            
            {{ range sort .Site.Data.carousel "weight" }}
            <div class="item" style="background: url('{{ .image | absURL }}') center center no-repeat; background-size: cover; width: 100vh;">
                </div>
            {{ end }}
        </div>
    </div>
</section>

<style>
#intro {
    position: relative;
    width: 100vw;
    margin-top: -130px !important;
    padding: 0 !important;
    z-index: 1;
    overflow: hidden;
}

.home-carousel .dark-mask,
.home-carousel::before,
.home-carousel::after {
    display: none !important;
}

.item {
    background-position: center;
    background-size: cover;
    background-repeat: no-repeat;
}

@media (min-width: 992px) {
    .item {
        width: 100vw;
        height: calc(100vh + 130px);
    }
}

@media (max-width: 991px) {
    #intro {
        margin-top: -100px !important;
    }
    .item {
        width: 100vw;
        height: 50vh;
    }
}

@media (max-width: 767px) {
    #intro {
        margin-top: -80px !important;
    }
    .item {
        height: 40vh;
    }
}

.owl-theme .owl-controls {
    position: absolute;
    bottom: 150px;
    width: 100%;
    z-index: 10;
}

.owl-theme .owl-controls .owl-page span {
    background: #ffffff !important;
}

@media (max-width: 991px) {
    .owl-theme .owl-controls {
        bottom: 15px;
    }
}
</style>
{{ end }}
{{ end }}
{{ end }}
