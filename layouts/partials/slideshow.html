<div class="slideshow">

  <div class="slide active">
    <img src="{{ .Get "img1" }}">
    <p>{{ .Get "cap1" }}</p>
  </div>

  <div class="slide">
    <img src="{{ .Get "img2" }}">
    <p>{{ .Get "cap2" }}</p>
  </div>

  <div class="slide">
    <img src="{{ .Get "img3" }}">
    <p>{{ .Get "cap3" }}</p>
  </div>

  <button class="prev">❮</button>
  <button class="next">❯</button>

</div>
