<style>
	.aboutus{
		background-color: #dfdfdf;
		color: #303030;
	}
	.aboutus {
	background-color: #dfdfdf;
	color: #303030;
	padding: 80px 0;
	}

	.aboutus-photo img {
	width: 100%;
	max-width: 500px;
	opacity: 0;
	transform: translateY(40px) scale(1.03);
	transition: opacity 1s ease, transform 1s ease;
	}

	.aboutus-text {
	opacity: 0;
	transform: translateY(30px);
	transition: opacity 0.8s ease, transform 0.8s ease;
	transition-delay: 0.2s;
	}

	.aboutus.is-show .aboutus-photo img {
	opacity: 1;
	transform: translateY(0) scale(1);
	}

	.aboutus.is-show .aboutus-text {
	opacity: 1;
	transform: translateY(0);
	}

	.aboutus q {
	color: #da4d4d;
	font-size: 10pt;
	}

	.aboutus h2 {
	font-size: 25pt;
	}

	.aboutus h2 span {
	font-size: 15pt;
	}

	@media (max-width:767px){

    .aboutus-text{
        margin-top: 50px;
    }
	.aboutus h2 {
		font-size: 23pt;
	}
	.aboutus h2 span {
		font-size: 10pt;
	}
    }
	
</style>

<section class="bar no-mb no-padding aboutus js-fadein">
  <div class="container">
    <div class="col-12 col-md-6 aboutus-photo">
      <img src="/img/2.jpg" alt="About us">
    </div>

    <div class="col12 col-md-6 aboutus-text">
      <q>About us</q>
      <h2 class="aboutus-t">CORE <span>(Challengers of Rocket Engineering) とは</span></h2>
      <b>
        COREは関東圏の大学生が集まり，ハイブリッドロケットやCanSatの製作・打上げを行っているサークルです．
        <br><br>
        航空宇宙に興味があり，ロケットを自分の手で打ち上げたい学生が多く集まっています．
        <br><br>
        実践的なプロジェクトを通して技術・知識・マネジメントを学べます．
      </b>
    </div>
  </div>
</section>
<script>
document.addEventListener("DOMContentLoaded", () => {
  const targets = document.querySelectorAll(".js-fadein");

  const observer = new IntersectionObserver((entries, observer) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add("is-show");
        observer.unobserve(entry.target);
      }
    });
  }, {
    rootMargin: "0px 0px -150px 0px"
  });

  targets.forEach(el => observer.observe(el));
});
</script>
