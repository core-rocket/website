baseURL = 'https://corerocket.net/'
enableRobotsTXT = true
languageCode = 'ja'
title = 'CORE | 学生ロケット開発団体'
hasCJKLanguage = true
theme = "hugo-universal-theme"
publishDir = "public"
googleAnalytics = "G-ZX4CJMTV2W"

[sitemap]
  changefreq = "weekly"
  priority = 0.5
  filename = "sitemap.xml"

[markup]
	[markup.goldmark]
		[markup.goldmark.renderer]
			unsafe = true
	[markup.tableOfContents]
		endLevel = 2
		ordered = true
		startLevel = 2

[menu]
[[menu.main]]
    name       = "ホーム"
    identifier = "menu.home"
    url        = "/"
    weight     = 1

[[menu.main]]
    name       = "団体について"
    url        = "/about"
    weight     = 2

[[menu.main]]
    name       = "ロケット"
    url        = "/rocket"
    weight     = 3

[[menu.main]]
    name       = "COREの機体"
    url        = "/history"
    weight     = 4

[[menu.main]]
    name       = "ブログ"
    url        = "/blog"
    weight     = 5

[[menu.main]]
    name       = "協賛・協力"
    url        = "/sponsor"
    weight     = 6

[[menu.main]]
    name       = "お問い合わせ"
    url        = "/contact"
    weight     = 7



[params]
    style = "red"

    disabled_logo = false
    logo_text = "Universal"

    logo = "img/CORE_logo_tr.png"
    logo_small = "img/CORE_logo_tr.png"

    show_breadcrumbs = false

    custom_css = ["css/custom.css"]

    date_format = "2006-01-02"
    address = "Hino, Tokyo"

    favicon = "/img/CORE_logo_wh.ico"

    description = "COREは関東圏の大学生が集まり，ハイブリッドロケットの製作・打上げを行っているサークルです．航空宇宙に興味があり，ロケットを自分の手で打ち上げたい学生が多く集まっています．実践的なプロジェクトを通して技術・知識・マネジメントを学べます．"
    ogp_image = "/img/ss/hp6.webp"
    keywords = ["ロケット", "学生ロケット", "CORE", "ハイブリッドロケット", "宇宙開発", "ロケットサークル"]

[params.features]
    enable = false

[params.testimonials]
    enable = false
    
[params.clients]
    enable = false
