baseURL = 'https://corerocket.net/'
languageCode = 'ja-jp'
title = 'CORE'
hasCJKLanguage = true
theme = "hugo-universal-theme"
publishDir = "docs"
googleAnalytics = "G-ZX4CJMTV2W"

[markup]
	[markup.goldmark]
		[markup.goldmark.renderer]
			unsafe = true
	[markup.tableOfContents]
		endLevel = 2
		ordered = true
		startLevel = 2

[menu]
[[menu.main]]
    name       = "ホーム"
    identifier = "menu.home"
    url        = "/"
    weight     = 1

[[menu.main]]
    name       = "団体について"
    url        = "/about"
    weight     = 2

[[menu.main]]
    name       = "ロケット"
    url        = "/rocket"
    weight     = 3

[[menu.main]]
    name       = "COREの機体"
    url        = "/history"
    weight     = 4

[[menu.main]]
    name       = "ブログ"
    url        = "/blog"
    weight     = 5

[[menu.main]]
    name       = "協賛・協力"
    url        = "/sponsor"
    weight     = 6

[[menu.main]]
    name       = "お問い合わせ"
    url        = "/contact"
    weight     = 7




# Top bar social links menu

[[menu.topbar]]
    weight = 1
    name = "Phone"
    url = "tel:+12 34 567 89 01"
    pre = "<i class='fas fa-2x fa-phone'></i>"

[[menu.topbar]]
    weight = 2
    name = "GitHub"
    url = "https://github.com/devcows/hugo-universal-theme"
    pre = "<i class='fab fa-2x fa-github'></i>"

[[menu.topbar]]
    weight = 3
    name = "Facebook"
    url = "https://facebook.com"
    pre = "<i class='fab fa-2x fa-facebook'></i>"

[[menu.topbar]]
    weight = 4
    name = "X"
    url = "https://x.com"
    pre = "<i class='fab fa-2x fa-x-twitter'></i>"

[[menu.topbar]]
    weight = 5
    name = "Email"
    url = "mailto:hello@universal.com"
    pre = "<i class='fas fa-2x fa-envelope'></i>"


[params]
    style = "red"

    disabled_logo = false
    logo_text = "Universal"

    logo = "img/CORE_logo_tr.png"
    logo_small = "img/CORE_logo_tr.png"

    show_breadcrumbs = false

    custom_css = ["css/custom.css"]

    date_format = "2006-01-02"
    description = "Site description"
    address = "Hino, Tokyo"

    favicon = "/img/CORE_logo_wh.ico"

[params.features]
    enable = false

[params.testimonials]
    enable = false
    
[params.clients]
    enable = false